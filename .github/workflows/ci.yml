name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f Dockerfile.api -t url-shortener-api:ci .

      - name: Build worker image
        run: docker build -f Dockerfile.worker -t url-shortener-worker:ci .

  compose-smoke:
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Start stack
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in {1..30}; do
            if curl -sf http://localhost:8000/health; then
              exit 0
            fi
            sleep 5
          done
          docker compose logs
          exit 1

      - name: Shorten, redirect, and verify metrics
        run: |
          CODE=$(curl -sf -X POST http://localhost:8000/shorten \
            -H 'Content-Type: application/json' \
            -d '{"long_url":"https://example.com/ci-smoke"}' \
            | python3 -c 'import sys,json; print(json.load(sys.stdin)["short_code"])')
          curl -sf -o /dev/null -w "%{http_code}" "http://localhost:8000/${CODE}" | grep 302
          sleep 3
          curl -sf "http://localhost:8000/metrics"
          curl -sf "http://localhost:8000/urls/${CODE}/analytics"

      - name: Tear down
        if: always()
        run: docker compose down -v

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform validate
        working-directory: aws/terraform
        run: |
          terraform init -backend=false
          terraform validate

name: Deploy ECS

on:
  workflow_dispatch:
    inputs:
      aws_region:
        description: AWS region
        required: true
        default: us-east-1

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ inputs.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.api -t $ECR_REGISTRY/url-shortener-api:$IMAGE_TAG .
          docker push $ECR_REGISTRY/url-shortener-api:$IMAGE_TAG

      - name: Build and push worker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -f Dockerfile.worker -t $ECR_REGISTRY/url-shortener-worker:$IMAGE_TAG .
          docker push $ECR_REGISTRY/url-shortener-worker:$IMAGE_TAG

      - name: Deploy note
        run: |
          echo "Images pushed to ECR. Update ECS services/task definitions to roll out new tags."
          echo "Full ECS service wiring is left as an exercise after terraform apply."
